name: Model Conversion

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight
  workflow_dispatch:
    inputs:
      filter:
        description: "Model filter (regex)"
        required: false
        default: ""

jobs:
  convert:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Launch HF Job
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_CONVERT }}
        run: |
          FILTER_ARGS=""
          if [ -n "${{ github.event.inputs.filter }}" ]; then
            FILTER_ARGS="--filter ${{ github.event.inputs.filter }}"
          fi
          bash hf-job.sh --owner ggml-org $FILTER_ARGS
